name: coursectl CI

on:
  push:
    paths:
      - "coursectl/**"
      - ".github/workflows/coursectl-ci.yml"
  pull_request:
    paths:
      - "coursectl/**"
      - ".github/workflows/coursectl-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: vet and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coursectl
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go (version pinned by coursectl/go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: coursectl/go.mod
          cache-dependency-path: coursectl/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
