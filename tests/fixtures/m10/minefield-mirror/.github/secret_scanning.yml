# Secret-scanning allowlist. The credential-shaped strings in this repository
# are intentional, documented non-secrets used for security training (see
# NOTICE). This configuration tells push-protection and secret scanning not to
# flag them, so publishing the repository is not blocked and reviewers are not
# paged for known example values.
paths-ignore:
  - ".env"
  - "testdata/**"
  - "docs/**"
